name: bake stats

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/bake.mjs
        env:
          # qisto is private; the default GITHUB_TOKEN can't read it. Add a fine-grained
          # PAT with read access to tnsaruniitr-lab/qisto as secret QISTO_READ_TOKEN.
          QISTO_READ_TOKEN: ${{ secrets.QISTO_READ_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: commit if changed
        id: commit
        run: |
          git config user.name "qisto-bake-bot"
          git config user.email "actions@github.com"
          git add data/stats.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "bake: refresh stats" && git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: trigger pages deploy
        if: steps.commit.outputs.changed == 'true'
        run: gh workflow run deploy.yml -R "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
