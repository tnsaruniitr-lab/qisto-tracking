name: bake stats

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/bake.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: commit if changed
        run: |
          git config user.name "qisto-bake-bot"
          git config user.email "actions@github.com"
          git add data/stats.json
          git diff --cached --quiet || (git commit -m "bake: refresh stats" && git push)
